name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      - name: Build
        run: make app
      - name: Verify bundle
        run: |
          test -f .build/PolinShield.app/Contents/MacOS/PolinShield
          codesign --verify --verbose .build/PolinShield.app
